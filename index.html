<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>MyHabits</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { --bg: #0a0a0a; --card: #1c1c1e; --card-border: #2c2c2e; --text: #f5f5f7; --text2: #8e8e93; --mint: #34c759; }
    html, body { background: var(--bg); margin: 0; padding: 0; overflow: hidden; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; color: var(--text); }
    .app-wrap { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; }

    .tab-bar { display: flex; justify-content: center; gap: 4px; padding: 8px 12px 10px; flex-shrink: 0; background: var(--bg); }
    .tab-bar-inner { display: flex; justify-content: space-around; background: #1c1c1e; border-radius: 28px; padding: 6px 8px; width: 100%; max-width: 400px; }
    .tab-btn { padding: 6px 16px; gap: 3px; border-radius: 20px; transition: background 0.2s; }
    .tab-btn.active { background: rgba(52,199,89,0.15); }
    .tab-btn svg { width: 26px; height: 26px; }
    .tab-btn { background: none; border: none; color: var(--text2); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 16px; transition: color 0.2s; }
    .tab-btn.active { color: var(--mint); }
    .tab-btn svg { width: 24px; height: 24px; fill: currentColor; }

    .page { display: none; padding: 16px; padding-top: 50px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; }
    .page.active { display: block; }

    .date-label { font-size: 12px; color: var(--mint); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
    .page-title { font-size: 34px; font-weight: 800; margin: 6px 0 24px; background: linear-gradient(135deg, #fff 0%, #999 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .progress-card { display: flex; align-items: center; gap: 20px; background: linear-gradient(145deg, rgba(52,199,89,0.14), rgba(90,200,250,0.06)); border-radius: 22px; padding: 20px; border: 1px solid rgba(52,199,89,0.12); margin-bottom: 24px; }
    .ring-wrap { position: relative; width: 68px; height: 68px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); filter: drop-shadow(0 0 10px rgba(52,199,89,0.35)); }
    .ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; }
    .progress-info .label { font-size: 17px; font-weight: 700; }
    .progress-info .sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

    .habits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .habit-card { padding: 18px; border-radius: 22px; transition: transform 0.2s; position: relative; overflow: hidden; min-height: 150px; display: flex; flex-direction: column; }
    .habit-card::before { content: ''; position: absolute; inset: 0; border-radius: 22px; background: radial-gradient(circle at 30% 0%, rgba(255,255,255,0.1) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(0,0,0,0.2) 0%, transparent 60%); pointer-events: none; }
    .habit-card:active { transform: scale(0.95); }
    .habit-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: auto; }
    .habit-emoji { font-size: 28px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3)); }
    .habit-name-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 4px; }
    .habit-name { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
    .habit-streak { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .week-dots { display: flex; gap: 5px; margin-top: 12px; }
    .week-dot { width: 18px; height: 8px; border-radius: 3px; }
    .check-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s; }
    .check-btn.checked { border-color: transparent; box-shadow: 0 0 12px rgba(255,255,255,0.15); }
    .check-btn svg { width: 16px; height: 16px; fill: white; opacity: 0; transition: opacity 0.2s; }
    .check-btn.checked svg { opacity: 1; }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--text2); }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state .msg { font-size: 16px; line-height: 1.5; }

    .habit-row { display: flex; align-items: center; gap: 12px; background: var(--card); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid var(--card-border); transition: transform 0.15s; }
    .habit-row:active { transform: scale(0.98); }
    .habit-row .emoji { font-size: 24px; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
    .habit-row .info { flex: 1; }
    .habit-row .info .name { font-size: 15px; font-weight: 700; }
    .habit-row .info .meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .habit-row .streak-badge { font-size: 13px; font-weight: 700; color: #ffb340; }
    .habit-row .actions { display: flex; gap: 8px; }
    .icon-btn { width: 34px; height: 34px; border-radius: 10px; border: none; background: rgba(255,255,255,0.06); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; }
    .icon-btn:active { transform: scale(0.9); }
    .icon-btn.delete:hover { background: rgba(255,59,48,0.2); color: #ff3b30; }

    .add-btn { position: absolute; bottom: 100px; right: 20px; width: 56px; height: 56px; border-radius: 50%; border: none; background: linear-gradient(135deg, #34c759, #30d158); color: white; font-size: 30px; cursor: pointer; box-shadow: 0 4px 24px rgba(52,199,89,0.45); display: flex; align-items: center; justify-content: center; transition: transform 0.2s; z-index: 50; }
    .add-btn:active { transform: scale(0.88); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: linear-gradient(180deg, #2c2c2e, #1c1c1e); border-radius: 24px 24px 0 0; width: 100%; max-width: 500px; max-height: 85dvh; overflow-y: auto; padding: 28px 22px calc(22px + env(safe-area-inset-bottom)); animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 20px; font-weight: 800; }
    .modal-close { background: rgba(255,255,255,0.08); border: none; color: var(--text); width: 34px; height: 34px; border-radius: 50%; font-size: 18px; cursor: pointer; }
    .form-label { font-size: 12px; color: var(--mint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; font-weight: 600; }
    .form-input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--card-border); background: var(--bg); color: var(--text); font-size: 16px; outline: none; margin-bottom: 20px; transition: all 0.2s; }
    .form-input:focus { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(52,199,89,0.12); }
    .emoji-grid, .color-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .emoji-opt { width: 46px; height: 46px; font-size: 24px; border-radius: 14px; border: 2px solid transparent; background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .emoji-opt:active { transform: scale(0.9); }
    .emoji-opt.selected { border-color: var(--mint); background: rgba(52,199,89,0.1); }
    .color-opt { width: 38px; height: 38px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
    .color-opt:active { transform: scale(0.85); }
    .color-opt.selected { border-color: white; transform: scale(1.2); box-shadow: 0 2px 12px rgba(255,255,255,0.2); }
    .save-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; background: linear-gradient(135deg, #34c759, #30d158); color: white; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(52,199,89,0.3); }
    .save-btn:disabled { opacity: 0.3; box-shadow: none; }

    .stats-card { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid var(--card-border); margin-bottom: 16px; }
    .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .month-nav button { background: rgba(255,255,255,0.06); border: none; color: var(--text); width: 38px; height: 38px; border-radius: 12px; font-size: 18px; cursor: pointer; }
    .month-nav button:disabled { opacity: 0.25; }
    .month-nav .label { font-size: 17px; font-weight: 700; }
    .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
    .cal-header span { text-align: center; font-size: 11px; color: var(--text2); font-weight: 600; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day { aspect-ratio: 1; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: var(--text); cursor: pointer; transition: transform 0.15s; }
    .cal-day:active { transform: scale(0.85); }
    .overview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-box { text-align: center; padding: 14px 8px; background: linear-gradient(135deg, rgba(52,199,89,0.08), rgba(90,200,250,0.04)); border-radius: 14px; border: 1px solid rgba(52,199,89,0.08); }
    .stat-box .val { font-size: 24px; font-weight: 800; color: var(--mint); }
    .stat-box .lbl { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .section-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }
    .habit-stat-row { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 14px; margin-bottom: 8px; }
    .habit-stat-row .emoji { font-size: 22px; }
    .habit-stat-row .info { flex: 1; }
    .habit-stat-row .name { font-size: 14px; font-weight: 700; }
    .habit-stat-row .pct { font-size: 12px; color: var(--text2); }
    .habit-stat-row .right { text-align: right; }
    .habit-stat-row .streak { font-size: 13px; font-weight: 700; color: #ffb340; }
    .habit-stat-row .best { font-size: 11px; color: var(--text2); }

    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 300; display: none; align-items: center; justify-content: center; }
    .confirm-overlay.open { display: flex; }
    .confirm-box { background: #2c2c2e; border-radius: 20px; padding: 28px; width: 290px; text-align: center; animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1); }
    .confirm-box .msg { font-size: 16px; font-weight: 600; margin-bottom: 22px; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btns button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text); }
    .btn-danger { background: linear-gradient(135deg, #ff3b30, #ff453a); color: white; }

    .login-screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; }
    .login-screen.visible { display: flex; }
    .login-screen.hidden { display: none; }
    .pin-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .pin-subtitle { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
    .pin-dots { display: flex; gap: 16px; margin-bottom: 12px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--text2); background: transparent; transition: all 0.15s; }
    .pin-dot.filled { background: var(--text); border-color: var(--text); animation: dotPop 0.15s ease; }
    @keyframes dotPop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
    .pin-error { color: #ff3b30; font-size: 13px; height: 20px; margin-bottom: 16px; }
    .pin-error.shake { animation: pinShake 0.4s ease; }
    @keyframes pinShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-12px)} 40%{transform:translateX(12px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 12px; }
    .pin-key { width: 80px; height: 80px; border-radius: 50%; border: 1px solid var(--card-border); background: var(--card); color: var(--text); font-size: 28px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; user-select: none; -webkit-user-select: none; }
    .pin-key:active { background: rgba(255,255,255,0.15); }
    .pin-key.empty { border: none; background: transparent; cursor: default; }
    .pin-key.empty:active { background: transparent; }
    .pin-key.delete { font-size: 20px; border: none; background: transparent; }
    .pin-key.delete:active { background: rgba(255,255,255,0.08); }

    .finance-total { text-align: center; padding: 28px 16px; background: linear-gradient(145deg, rgba(52,199,89,0.12), rgba(90,200,250,0.06)); border-radius: 22px; border: 1px solid rgba(52,199,89,0.1); margin-bottom: 20px; }
    .finance-total .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; font-weight: 600; }
    .finance-total .amount { font-size: 42px; font-weight: 800; color: var(--mint); }
    .finance-total .currency { font-size: 20px; font-weight: 400; color: var(--text2); }
    .finance-month-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--card-border); margin-bottom: 16px; }
    .finance-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .finance-row:last-of-type { border-bottom: none; }
    .finance-row .fl { display: flex; align-items: center; gap: 10px; }
    .finance-row .fi { font-size: 20px; }
    .finance-row .fn { font-size: 15px; color: var(--text2); }
    .finance-input { width: 110px; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--card-border); background: var(--bg); color: var(--text); font-size: 16px; text-align: right; outline: none; transition: all 0.2s; }
    .finance-input:focus { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(52,199,89,0.12); }
    .finance-input::-webkit-outer-spin-button, .finance-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .finance-input { -moz-appearance: textfield; }
    .finance-save-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, #34c759, #30d158); color: white; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; box-shadow: 0 4px 16px rgba(52,199,89,0.25); }
    .finance-history { margin-top: 8px; }
    .finance-hist-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--card); border-radius: 14px; border: 1px solid var(--card-border); margin-bottom: 8px; }
    .finance-hist-row .month { font-size: 14px; font-weight: 700; }
    .finance-hist-row .details { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .finance-hist-row .saved { font-size: 16px; font-weight: 700; color: var(--mint); }
  </style>
</head>
<body>

  <div class="app-wrap">
  <div class="login-screen" id="login-screen">
    <div class="pin-title" id="pin-title">Enter Passcode</div>
    <div class="pin-subtitle" id="pin-subtitle">Create a 4-digit passcode</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-pad">
      <button class="pin-key" data-key="1">1</button><button class="pin-key" data-key="2">2</button><button class="pin-key" data-key="3">3</button>
      <button class="pin-key" data-key="4">4</button><button class="pin-key" data-key="5">5</button><button class="pin-key" data-key="6">6</button>
      <button class="pin-key" data-key="7">7</button><button class="pin-key" data-key="8">8</button><button class="pin-key" data-key="9">9</button>
      <button class="pin-key empty"></button><button class="pin-key" data-key="0">0</button><button class="pin-key delete" data-key="del"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 4h8a3 3 0 013 3v10a3 3 0 01-3 3H9l-6-8 6-8z"/><path d="M14 10l-4 4m0-4l4 4" stroke-linecap="round"/></svg></button>
    </div>
  </div>

  <div id="page-today" class="page active">
    <div class="date-label" id="today-date"></div>
    <div class="page-title">My habits</div>
    <div id="today-list"></div>
  </div>

  <div id="page-habits" class="page">
    <div class="page-title">Habits</div>
    <div id="habits-list"></div>
  </div>

  <div id="page-stats" class="page">
    <div class="page-title">Planner</div>
    <div class="stats-card">
      <div class="month-nav"><button id="prev-month">&#8249;</button><span class="label" id="month-label"></span><button id="next-month">&#8250;</button></div>
      <div class="cal-header" id="cal-header"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <div id="day-detail-section" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 14px;">
        <div id="day-detail-title" style="font-size:18px;font-weight:700;"></div>
      </div>

      <div class="stats-card" style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div class="section-title" style="margin-bottom:0;">Reminders</div>
          <button onclick="openAddReminder()" style="background:rgba(52,199,89,0.15);border:none;color:var(--mint);padding:6px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;">+ Add</button>
        </div>
        <div id="day-reminders-list"></div>
      </div>

      <div class="stats-card" style="margin-bottom:12px;">
        <div class="section-title" style="margin-bottom:10px;">Habits</div>
        <div id="day-habits-list"></div>
      </div>
    </div>


    <div class="modal-overlay" id="reminder-overlay">
      <div class="modal">
        <div class="modal-header"><span class="modal-title">New Reminder</span><button class="modal-close" onclick="closeAddReminder()">&times;</button></div>
        <label class="form-label">Time</label>
        <input type="time" class="form-input" id="reminder-time" value="09:00">
        <label class="form-label">What</label>
        <input type="text" class="form-input" id="reminder-text" placeholder="e.g. Meeting with Alex" maxlength="100">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;margin-bottom:16px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:20px;">⭐</span>
            <span style="font-size:15px;">Important</span>
          </div>
          <label style="position:relative;width:50px;height:30px;display:block;cursor:pointer;">
            <input type="checkbox" id="reminder-notify" style="display:none;">
            <div id="toggle-track" style="position:absolute;inset:0;background:var(--card-border);border-radius:15px;transition:background 0.3s;"></div>
            <div id="toggle-thumb" style="position:absolute;top:3px;left:3px;width:24px;height:24px;background:white;border-radius:50%;transition:transform 0.3s;"></div>
          </label>
        </div>
        <button class="save-btn" id="reminder-save-btn" onclick="saveReminder()">Save</button>
      </div>
    </div>
  </div>

  <div id="page-finance" class="page">
    <div class="page-title">Finance</div>
    <div class="finance-month-card">
      <div class="month-nav"><button id="fin-prev-month">&#8249;</button><span class="label" id="finance-month-title"></span><button id="fin-next-month">&#8250;</button></div>
      <div class="finance-row"><div class="fl"><span class="fi">💰</span><span class="fn" style="cursor:pointer;text-decoration:underline;text-decoration-color:rgba(255,255,255,0.2);text-underline-offset:3px;" onclick="showEarnedHistory()">Earned</span></div><div style="display:flex;align-items:center;gap:6px;"><input class="finance-input" id="fin-earned" type="number" placeholder="0" inputmode="decimal"><span>&euro;</span></div></div>
      <div class="finance-row"><div class="fl"><span class="fi">🏦</span><span class="fn" style="cursor:pointer;text-decoration:underline;text-decoration-color:rgba(255,255,255,0.2);text-underline-offset:3px;" onclick="showSavedHistory()">Saved</span></div><div style="display:flex;align-items:center;gap:6px;"><input class="finance-input" id="fin-saved" type="number" placeholder="0" inputmode="decimal"><span>&euro;</span></div></div>
      <button class="finance-save-btn" id="fin-save-btn">Save</button>
    </div>


    <div id="earned-page" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));padding-bottom:calc(80px + env(safe-area-inset-bottom));">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">

    <div id="saved-page" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));padding-bottom:calc(80px + env(safe-area-inset-bottom));">

        <span class="page-title" style="margin:0;">Savings</span>
      </div>
      <div class="stats-card" style="margin-bottom:16px;">
        <div class="month-nav">
          <button id="saved-prev">&#8249;</button>
          <span class="label" id="saved-month-label"></span>
          <button id="saved-next">&#8250;</button>
        </div>
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:13px;color:var(--text2);margin-bottom:6px;">Saved this month</div>
          <div style="font-size:36px;font-weight:800;color:var(--mint);" id="saved-month-amount">0 &euro;</div>
        </div>
      </div>
      <div style="margin-top:24px;text-align:center;padding:24px 16px;background:linear-gradient(145deg,rgba(52,199,89,0.14),rgba(90,200,250,0.06));border-radius:22px;border:1px solid rgba(52,199,89,0.1);">
        <div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:8px;">Total saved</div>
        <div style="font-size:42px;font-weight:800;color:var(--mint);" id="saved-page-total">0 <span style="font-size:20px;color:var(--text2);font-weight:400;">€</span></div>

    <div class="modal-overlay" id="total-modal-overlay" style="z-index:450;">
      <div class="modal">
        <div class="modal-header"><span class="modal-title" id="total-modal-title">Total</span><button class="modal-close" onclick="closeTotalModal()">&times;</button></div>
        <div style="margin-bottom:20px;">
          <label style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:1px;font-weight:600;display:block;margin-bottom:8px;">From</label>
          <select id="total-from" style="width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--card-border);background:var(--bg);color:var(--text);font-size:16px;outline:none;"></select>

          <label style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:1px;font-weight:600;display:block;margin-bottom:8px;">To</label>
          <select id="total-to" style="width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--card-border);background:var(--bg);color:var(--text);font-size:16px;outline:none;"></select>

        <div class="finance-total" style="margin-bottom:0;">
          <div class="label" id="total-range-label">Total</div>

  <nav class="tab-bar"><div class="tab-bar-inner">
    <button class="tab-btn active" data-page="today"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>Today</button>
    <button class="tab-btn" data-page="habits"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>Habits</button>
    <button class="tab-btn" data-page="stats"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>Planner</button>
    <button class="tab-btn" data-page="finance"><svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>Finance</button>
  </div></nav>
  </div>

  <button class="add-btn" id="add-btn">+</button>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header"><span class="modal-title" id="modal-title">New Habit</span><button class="modal-close" id="modal-close">&times;</button></div>
      <label class="form-label">Name</label>
      <textarea class="form-input" id="input-name" placeholder="e.g. Meditate" maxlength="40" rows="2" style="resize:none;"></textarea>
      <label class="form-label">Icon</label>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="text" class="form-input" id="custom-emoji" placeholder="" maxlength="2" style="width:70px;text-align:center;font-size:24px;margin-bottom:0;">
        <div style="flex:1;"></div>
      </div>
      <div class="emoji-grid" id="emoji-grid"></div>
      <label class="form-label">Color</label><div class="color-grid" id="color-grid"></div>
      <button class="save-btn" id="save-btn" disabled>Save</button>
    </div>
  </div>

  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="msg" id="confirm-msg">Delete this habit?</div>
      <div class="confirm-btns"><button class="btn-cancel" id="confirm-cancel">Cancel</button><button class="btn-danger" id="confirm-ok">Delete</button></div>
    </div>
  </div>

<script>
// ===== AUTH =====
let authToken = localStorage.getItem('myhabits_token') || null;

async function initAuth() {
  const loginScreen = document.getElementById('login-screen');
  const dots = document.querySelectorAll('.pin-dot');
  const errorEl = document.getElementById('pin-error');
  let pin = '', confirmPin = '', isRegistering = false, isConfirming = false;

  try {
    const res = await fetch('/api/auth/status');
    if (!res.ok) return;
    const { hasPassword } = await res.json();

    if (hasPassword && authToken) {
      const check = await fetch('/api/data', { headers: { 'X-Auth-Token': authToken } });
      if (check.ok) return;
      authToken = null; localStorage.removeItem('myhabits_token');
    }

    if (!hasPassword && !authToken) {
      isRegistering = true;
      document.getElementById('pin-title').textContent = 'Create Passcode';
      document.getElementById('pin-subtitle').textContent = 'Enter a 4-digit code';
    } else if (hasPassword) {
      document.getElementById('pin-title').textContent = 'Enter Passcode';
      document.getElementById('pin-subtitle').textContent = '';
    } else {
      return;
    }

    loginScreen.classList.add('visible');

    function updateDots() { dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length)); }
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('shake'); void errorEl.offsetWidth; errorEl.classList.add('shake');
      const dc = document.getElementById('pin-dots');
      dc.classList.remove('shake'); void dc.offsetWidth; dc.classList.add('shake');
    }
    function resetPin() { pin = ''; updateDots(); }

    function hideLogin() { loginScreen.classList.remove('visible'); loginScreen.classList.add('hidden'); }

    async function handleComplete() {
      if (isRegistering && !isConfirming) {
        confirmPin = pin; isConfirming = true; resetPin();
        document.getElementById('pin-title').textContent = 'Confirm Passcode';
        document.getElementById('pin-subtitle').textContent = 'Re-enter your code';
        errorEl.textContent = ''; return;
      }
      if (isRegistering && isConfirming) {
        if (pin !== confirmPin) {
          showError("Passcodes didn't match. Try again."); resetPin(); isConfirming = false;
          document.getElementById('pin-title').textContent = 'Create Passcode';
          document.getElementById('pin-subtitle').textContent = 'Enter a 4-digit code'; return;
        }
        const r = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pin}) });
        const d = await r.json();
        if (d.ok) { authToken = d.token; localStorage.setItem('myhabits_token', authToken); hideLogin(); loadFromServer().then(()=>renderToday()); }
        return;
      }
      const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pin}) });
      const d = await r.json();
      if (d.ok) { authToken = d.token; localStorage.setItem('myhabits_token', authToken); hideLogin(); loadFromServer().then(()=>renderToday()); }
      else { showError('Wrong passcode'); resetPin(); }
    }

    function handleKey(val) {
      if (val === 'del') { pin = pin.slice(0,-1); updateDots(); return; }
      if (pin.length >= 4) return;
      pin += val; updateDots();
      if (pin.length === 4) setTimeout(handleComplete, 200);
    }

    document.querySelectorAll('.pin-key').forEach(key => key.addEventListener('click', () => {
      const val = key.dataset.key; if (!val) return;
      handleKey(val);
    }));

    document.addEventListener('keydown', (e) => {
      if (!loginScreen.classList.contains('visible')) return;
      if (e.key >= '0' && e.key <= '9') handleKey(e.key);
      else if (e.key === 'Backspace') handleKey('del');
    });
  } catch {}
}

// ===== DATA =====
const EMOJIS = ['💪','📚','🧘','🏃','💧','🎨','🎵','💊','🥗','🌙','☀️','🚭','🔒','🧹','✍️','⭐️'];
const COLORS = [
  {name:'Mint',hex:'#34C759'},{name:'Teal',hex:'#5AC8FA'},{name:'Blue',hex:'#007AFF'},
  {name:'Purple',hex:'#AF52DE'},{name:'Pink',hex:'#FF2D55'},{name:'Red',hex:'#FF3B30'},
  {name:'Orange',hex:'#FF9500'},{name:'Yellow',hex:'#FFCC00'},{name:'Brown',hex:'#A2845E'},
  {name:'Gray',hex:'#8E8E93'},
];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let _cache = null;

async function loadFromServer() {
  try {
    const res = await fetch('/api/data', { headers: authToken ? { 'X-Auth-Token': authToken } : {} });
    if (!res.ok) return JSON.parse(localStorage.getItem('myhabits_data') || '{"habits":[],"completions":{}}');
    const serverData = await res.json();
    _cache = serverData;
    localStorage.setItem('myhabits_data', JSON.stringify(serverData));
    return serverData;
  } catch { return JSON.parse(localStorage.getItem('myhabits_data') || '{"habits":[],"completions":{}}'); }
}

function load() { return _cache || JSON.parse(localStorage.getItem('myhabits_data') || '{"habits":[],"completions":{}}'); }
let _saving = false;
function save(data) {
  _cache = data; localStorage.setItem('myhabits_data', JSON.stringify(data));
  _saving = true;
  fetch('/api/data', { method:'POST', headers:{'Content-Type':'application/json',...(authToken?{'X-Auth-Token':authToken}:{})}, body:JSON.stringify(data) }).then(()=>{_saving=false;}).catch(()=>{_saving=false;});
}
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isCompleted(data, habitId, date) { const k = dateKey(date); return !!(data.completions[k] && data.completions[k].includes(habitId)); }
function toggleCompletion(data, habitId, date) {
  const k = dateKey(date); if (!data.completions[k]) data.completions[k] = [];
  const i = data.completions[k].indexOf(habitId);
  if (i >= 0) data.completions[k].splice(i,1); else data.completions[k].push(habitId); save(data);
}
function currentStreak(data, habitId) {
  let streak = 0, d = new Date();
  if (!isCompleted(data, habitId, d)) d.setDate(d.getDate()-1);
  while (isCompleted(data, habitId, d)) { streak++; d = new Date(d); d.setDate(d.getDate()-1); }
  return streak;
}
function longestStreak(data, habitId) {
  const keys = Object.keys(data.completions).filter(k => (data.completions[k]||[]).includes(habitId)).sort();
  if (!keys.length) return 0; let longest=1, cur=1;
  for (let i=1;i<keys.length;i++) { const diff=Math.round((new Date(keys[i])-new Date(keys[i-1]))/86400000); if(diff===1){cur++;longest=Math.max(longest,cur);}else if(diff>1)cur=1; }
  return longest;
}
function hexToRgba(hex, a) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }

// ===== TABS =====
const tabs = document.querySelectorAll('.tab-btn');
const pages = document.querySelectorAll('.page');
const addBtn = document.getElementById('add-btn');
function switchTab(pageName) {
  tabs.forEach(b=>b.classList.remove('active'));
  pages.forEach(p=>{p.classList.remove('active','swiping','animating');p.style.transform='';});
  document.querySelector(`[data-page="${pageName}"]`).classList.add('active');
  const page = document.getElementById('page-'+pageName);
  page.scrollTop = 0;
  page.classList.add('active');
  addBtn.style.display = (pageName==='today'||pageName==='habits') ? 'flex' : 'none';
  if(pageName==='today')renderToday(); if(pageName==='habits')renderHabits();
  if(pageName==='stats')renderStats();
  if(pageName==='finance')renderFinance();
}
tabs.forEach(t => t.addEventListener('click', () => { switchTab(t.dataset.page); }));

// ===== SWIPE =====
const tabOrder = ['today','habits','stats','finance'];
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 80 || Math.abs(dy) > Math.abs(dx)) return;

  // If earned/saved page is open, swipe right closes it
  if (dx > 0) {
    const earnedPage = document.getElementById('earned-page');
    const savedPage = document.getElementById('saved-page');
    if (earnedPage && earnedPage.style.display !== 'none') { closeEarnedHistory(); return; }
    if (savedPage && savedPage.style.display !== 'none') { closeSavedHistory(); return; }
  }

  const currentTab = document.querySelector('.tab-btn.active').dataset.page;
  const idx = tabOrder.indexOf(currentTab);
  const nextIdx = dx < 0 ? idx + 1 : idx - 1;
  if (nextIdx >= 0 && nextIdx < tabOrder.length) {
    switchTab(tabOrder[nextIdx]);
  }
});

// ===== TODAY =====
function renderToday() {
  const data = load(), today = new Date();
  document.getElementById('today-date').textContent = today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
  const list = document.getElementById('today-list');
  if (!data.habits.length) { list.innerHTML='<div class="empty-state"><div class="icon">✨</div><div class="msg">No habits yet.<br>Tap + to create your first habit.</div></div>'; return; }

  list.innerHTML = '<div class="habits-grid">' + data.habits.map(h => {
    const done = isCompleted(data,h.id,today), streak = currentStreak(data,h.id);
    const dots = Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return `<div class="week-dot" style="background:${isCompleted(data,h.id,d)?h.color:'rgba(255,255,255,0.1)'}"></div>`;}).join('');
    return `
      <div class="habit-card" style="background:linear-gradient(160deg,${hexToRgba(h.color,done?0.35:0.2)} 0%,${hexToRgba(h.color,0.08)} 60%,rgba(0,0,0,0.2) 100%);border:1px solid ${hexToRgba(h.color,0.15)}">
        <div class="habit-card-top">
          <span class="habit-emoji">${h.emoji}</span>
          <button class="check-btn ${done?'checked':''}" style="border-color:${hexToRgba(h.color,0.4)};background:${done?h.color:'none'}" onclick="toggleHabit('${h.id}')">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
          </button>
        </div>
        <div class="habit-name-row">
          <div class="habit-name">${h.name}</div>
          ${streak>0?`<div class="habit-streak" style="color:${streak>=50?'#5AC8FA':streak>=10?'#AF52DE':'#FF9500'}"><span style="font-size:14px;">${streak>=50?'💎':streak>=10?'🔮':'🔥'}</span> ${streak}</div>`:''}
        </div>
        <div class="week-dots">${dots}</div>
      </div>`;
  }).join('') + '</div>';
}
function toggleHabit(id) { const data=load(); toggleCompletion(data,id,new Date()); renderToday(); }

// ===== HABITS LIST =====
function renderHabits() {
  const data = load(), list = document.getElementById('habits-list');
  if (!data.habits.length) { list.innerHTML='<div class="empty-state"><div class="icon">📋</div><div class="msg">No habits yet.<br>Tap + to add one.</div></div>'; return; }
  list.innerHTML = data.habits.map(h => {
    const streak = currentStreak(data,h.id), created = new Date(h.createdAt);
    return `<div class="habit-row">
      <div class="emoji" style="background:${hexToRgba(h.color,0.2)}">${h.emoji}</div>
      <div class="info"><div class="name">${h.name}</div><div class="meta">Created ${created.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div></div>
      ${streak>0?`<span class="streak-badge">🔥 ${streak}</span>`:''}
      <div class="actions"><button class="icon-btn" onclick="editHabit('${h.id}')">✏️</button><button class="icon-btn delete" onclick="confirmDelete('${h.id}')">🗑</button></div>
    </div>`;
  }).join('');
}

// ===== MODAL =====
const overlay=document.getElementById('modal-overlay'),inputName=document.getElementById('input-name'),saveBtn=document.getElementById('save-btn');
let editingId=null, selectedEmoji=EMOJIS[0], selectedColor=COLORS[0].hex;
function openModal(title='New Habit'){document.getElementById('modal-title').textContent=title;overlay.classList.add('open');renderEmojiGrid();renderColorGrid();updateSaveBtn();setTimeout(()=>inputName.focus(),300);}
function closeModal(){overlay.classList.remove('open');inputName.value='';editingId=null;selectedEmoji=EMOJIS[0];selectedColor=COLORS[0].hex;}
document.getElementById('add-btn').addEventListener('click',()=>openModal());
document.getElementById('modal-close').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
inputName.addEventListener('input',updateSaveBtn);
function updateSaveBtn(){saveBtn.disabled=!inputName.value.trim();}
function renderEmojiGrid(){
  document.getElementById('emoji-grid').innerHTML=EMOJIS.map(e=>`<button class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="pickEmoji('${e}')">${e}</button>`).join('');
  document.getElementById('custom-emoji').value = EMOJIS.includes(selectedEmoji) ? '' : selectedEmoji;
}
document.getElementById('custom-emoji').addEventListener('input', function() {
  const val = this.value.trim();
  if (val) { selectedEmoji = val; document.querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('selected')); }
});
function renderColorGrid(){document.getElementById('color-grid').innerHTML=COLORS.map(c=>`<div class="color-opt ${c.hex===selectedColor?'selected':''}" style="background:${c.hex}" onclick="pickColor('${c.hex}')"></div>`).join('');}
window.pickEmoji=function(e){selectedEmoji=e;document.getElementById('custom-emoji').value='';renderEmojiGrid();};
window.pickColor=function(c){selectedColor=c;renderColorGrid();};
saveBtn.addEventListener('click',()=>{
  const name=inputName.value.trim(); if(!name)return; const data=load();
  if(editingId){const h=data.habits.find(h=>h.id===editingId);if(h){h.name=name;h.emoji=selectedEmoji;h.color=selectedColor;}}
  else{data.habits.push({id:crypto.randomUUID(),name,emoji:selectedEmoji,color:selectedColor,createdAt:new Date().toISOString()});}
  save(data);closeModal();renderToday();renderHabits();
});
window.editHabit=function(id){const data=load(),h=data.habits.find(h=>h.id===id);if(!h)return;editingId=id;inputName.value=h.name;selectedEmoji=h.emoji;selectedColor=h.color;openModal('Edit Habit');};
let deleteId=null; const confirmOverlay=document.getElementById('confirm-overlay');
window.confirmDelete=function(id){deleteId=id;confirmOverlay.classList.add('open');};
document.getElementById('confirm-cancel').addEventListener('click',()=>{confirmOverlay.classList.remove('open');deleteId=null;});
document.getElementById('confirm-ok').addEventListener('click',()=>{
  if(deleteId){const data=load();data.habits=data.habits.filter(h=>h.id!==deleteId);Object.keys(data.completions).forEach(k=>{data.completions[k]=data.completions[k].filter(id=>id!==deleteId);});save(data);}
  confirmOverlay.classList.remove('open');deleteId=null;renderHabits();renderToday();
});

// ===== STATS =====
let statsMonth = new Date();
document.getElementById('prev-month').addEventListener('click',()=>{statsMonth.setMonth(statsMonth.getMonth()-1);renderStats();});
document.getElementById('next-month').addEventListener('click',()=>{statsMonth.setMonth(statsMonth.getMonth()+1);renderStats();});
function renderStats(){
  const data=load(),now=new Date(),calendar=new Intl.DateTimeFormat('en-US',{month:'long',year:'numeric'});
  const year=statsMonth.getFullYear(),month=statsMonth.getMonth(),isCurrentMonth=(year===now.getFullYear()&&month===now.getMonth());
  document.getElementById('month-label').textContent=MONTHS[month]+' '+year;
  document.getElementById('next-month').disabled=false;
  document.getElementById('cal-header').innerHTML=DAYS.map(d=>`<span>${d}</span>`).join('');
  const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate();
  let grid=''; for(let i=0;i<firstDay;i++)grid+='<div class="cal-day"></div>';
  for(let day=1;day<=daysInMonth;day++){
    const date=new Date(year,month,day),isFuture=date>now;let ratio=0;
    if(!isFuture&&data.habits.length){ratio=data.habits.filter(h=>isCompleted(data,h.id,date)).length/data.habits.length;}
    const isToday = date.toDateString() === now.toDateString();
    const bg = isToday ? '#34C759' : '#1c1c1e';
    const color = isToday ? 'white' : '#e0e0e0';
    const dot = (!isToday && ratio > 0) ? `<div style="width:4px;height:4px;border-radius:50%;background:#34C759;"></div>` : '';
    const clickable = `onclick="showDayDetail(${year},${month},${day})"`;
    grid+=`<div class="cal-day" style="background:${bg};color:${color};" ${clickable}>${day}${dot}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=grid;

  // Auto-select today or preserve selected day
  if (!selectedDay) {
    const n = new Date();
    if (n.getFullYear()===year && n.getMonth()===month) showDayDetail(year, month, n.getDate());
  } else if (selectedDay.year===year && selectedDay.month===month) {
    showDayDetail(selectedDay.year, selectedDay.month, selectedDay.day);
  }
}

// ===== FINANCE =====
let finMonth = new Date();
function financeKey(date){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;}
function renderFinance(skipInputs){
  const data=load(); if(!data.finance)data.finance={};
  const now=new Date(),isCurrentMonth=finMonth.getFullYear()===now.getFullYear()&&finMonth.getMonth()===now.getMonth();
  document.getElementById('fin-next-month').disabled=isCurrentMonth;
  const key=financeKey(finMonth),current=data.finance[key]||{earned:0,saved:0};
  document.getElementById('finance-month-title').textContent=finMonth.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  if(!skipInputs){document.getElementById('fin-earned').value='';document.getElementById('fin-saved').value='';}
  let totalE=0,totalS=0;Object.values(data.finance).forEach(m=>{totalE+=(m.earned||0);totalS+=(m.saved||0);});
  document.getElementById('fin-quick-earned').textContent=totalE.toLocaleString('de-DE')+' €';
  document.getElementById('fin-quick-saved').textContent=totalS.toLocaleString('de-DE')+' €';
}
document.getElementById('fin-prev-month').addEventListener('click',()=>{finMonth=new Date(finMonth.getFullYear(),finMonth.getMonth()-1,1);renderFinance();});
document.getElementById('fin-next-month').addEventListener('click',()=>{const now=new Date(),next=new Date(finMonth.getFullYear(),finMonth.getMonth()+1,1);if(next<=new Date(now.getFullYear(),now.getMonth()+1,0)){finMonth=next;renderFinance();}});
document.getElementById('fin-save-btn').addEventListener('click',()=>{
  const data=load();if(!data.finance)data.finance={};
  const key=financeKey(finMonth),earned=parseFloat(document.getElementById('fin-earned').value)||0,saved=parseFloat(document.getElementById('fin-saved').value)||0;
  data.finance[key]={earned,saved};save(data);
  document.getElementById('fin-earned').value='';
  document.getElementById('fin-saved').value='';
  renderFinance();
});

// ===== DAY DETAIL (inline) =====
let selectedDay = null;

window.showDayDetail = function(year, month, day) {
  const data = load();
  const date = new Date(year, month, day);
  selectedDay = { year, month, day, key: dateKey(date) };

  const dateStr = date.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
  document.getElementById('day-detail-title').textContent = dateStr;
  document.getElementById('day-detail-section').style.display = 'block';

  // Highlight selected day in calendar
  document.querySelectorAll('.cal-day').forEach(d => d.style.outline = 'none');
  const allDays = document.querySelectorAll('.cal-day');
  allDays.forEach(d => { if (d.textContent == day && d.onclick) d.style.outline = '2px solid var(--mint)'; });

  // Habits
  const habitsList = document.getElementById('day-habits-list');
  if (!data.habits.length) {
    habitsList.innerHTML = '<div style="color:var(--text2);text-align:center;padding:12px">No habits</div>';
  } else {
    habitsList.innerHTML = data.habits.map(h => {
      const done = isCompleted(data, h.id, date);
      return `<div onclick="toggleHabitOnDay('${h.id}','${dateKey(date)}')" style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:${hexToRgba(h.color, done?0.12:0.04)};margin-bottom:6px;cursor:pointer;transition:transform 0.15s;">
        <span style="font-size:22px;">${h.emoji}</span>
        <span style="flex:1;font-size:14px;font-weight:600;">${h.name}</span>
        <span style="font-size:16px;color:${done?'var(--mint)':'var(--text2)'};">${done ? '&#10003;' : '&#10007;'}</span>
      </div>`;
    }).join('');
  }

  // Reminders
  renderReminders();

  // Scroll to detail
  document.getElementById('day-detail-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
};

function renderReminders() {
  if (!selectedDay) return;
  const data = load();
  if (!data.reminders) data.reminders = {};
  const dayReminders = data.reminders[selectedDay.key] || [];

  const list = document.getElementById('day-reminders-list');
  if (!dayReminders.length) {
    list.innerHTML = '<div style="color:var(--text2);text-align:center;padding:12px">No reminders</div>';
  } else {
    const sorted = dayReminders.slice().sort((a,b) => a.time.localeCompare(b.time));
    list.innerHTML = sorted.map((r, i) => `
      <div style="display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:rgba(90,200,250,0.06);margin-bottom:6px;border:1px solid rgba(90,200,250,0.1);">
        <span style="font-size:14px;font-weight:700;color:#5AC8FA;min-width:44px;">${r.time}</span>
        <span style="flex:1;font-size:14px;">${r.text}</span>
        ${r.notify ? '<span style="font-size:14px;" title="Important">⭐</span>' : ''}
        <button onclick="deleteReminder(${i})" style="background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer;padding:4px;">&#10005;</button>
      </div>
    `).join('');
  }
}

window.toggleHabitOnDay = function(habitId, dayKey) {
  const data = load();
  if (!data.completions[dayKey]) data.completions[dayKey] = [];
  const idx = data.completions[dayKey].indexOf(habitId);
  if (idx >= 0) data.completions[dayKey].splice(idx, 1);
  else data.completions[dayKey].push(habitId);
  save(data);
  showDayDetail(selectedDay.year, selectedDay.month, selectedDay.day);
  renderStats();
  renderToday();
};

// ===== REMINDERS =====
window.openAddReminder = function() {
  document.getElementById('reminder-text').value = '';
  document.getElementById('reminder-time').value = '09:00';
  document.getElementById('reminder-notify').checked = false;
  updateToggle();
  document.getElementById('reminder-overlay').classList.add('open');
};

function updateToggle() {
  const on = document.getElementById('reminder-notify').checked;
  document.getElementById('toggle-track').style.background = on ? 'var(--mint)' : 'var(--card-border)';
  document.getElementById('toggle-thumb').style.transform = on ? 'translateX(20px)' : 'translateX(0)';
}
document.getElementById('reminder-notify').addEventListener('change', updateToggle);
document.querySelector('label:has(#reminder-notify)').addEventListener('click', function(e) {
  if (e.target.tagName !== 'INPUT') {
    const cb = document.getElementById('reminder-notify');
    cb.checked = !cb.checked;
    updateToggle();
    e.preventDefault();
  }
});

window.closeAddReminder = function() {
  document.getElementById('reminder-overlay').classList.remove('open');
};
document.getElementById('reminder-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeAddReminder();
});

window.saveReminder = function() {
  if (!selectedDay) return;
  const time = document.getElementById('reminder-time').value;
  const text = document.getElementById('reminder-text').value.trim();
  if (!text) return;

  const data = load();
  if (!data.reminders) data.reminders = {};
  if (!data.reminders[selectedDay.key]) data.reminders[selectedDay.key] = [];
  const notify = document.getElementById('reminder-notify').checked;
  data.reminders[selectedDay.key].push({ time, text, notify });
  save(data);

  closeAddReminder();
  renderReminders();
};

window.deleteReminder = function(index) {
  if (!selectedDay) return;
  const data = load();
  if (!data.reminders || !data.reminders[selectedDay.key]) return;
  data.reminders[selectedDay.key].splice(index, 1);
  if (!data.reminders[selectedDay.key].length) delete data.reminders[selectedDay.key];
  save(data);
  renderReminders();
};

// ===== EARNED & SAVED PAGES =====
let earnedMonth = new Date();
let savedMonth = new Date();
let totalModalType = 'earned';

window.showEarnedHistory = function() { document.getElementById('earned-page').style.display='block'; renderFinancePage('earned'); };
window.closeEarnedHistory = function() { document.getElementById('earned-page').style.display='none'; };
window.showSavedHistory = function() { document.getElementById('saved-page').style.display='block'; renderFinancePage('saved'); };
window.closeSavedHistory = function() { document.getElementById('saved-page').style.display='none'; };

function renderFinancePage(type) {
  const data = load();
  if (!data.finance) data.finance = {};
  const now = new Date();
  const month = type==='earned' ? earnedMonth : savedMonth;
  const isCurrentMonth = month.getFullYear()===now.getFullYear() && month.getMonth()===now.getMonth();
  document.getElementById(type+'-next').disabled = isCurrentMonth;
  document.getElementById(type+'-month-label').textContent = month.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const key = financeKey(month);
  const monthData = data.finance[key] || {};
  document.getElementById(type+'-month-amount').textContent = (monthData[type]||0).toLocaleString('de-DE') + ' €';

  if (type === 'saved') {
    let ts = 0; Object.values(data.finance).forEach(m => { ts += (m.saved||0); });
    document.getElementById('saved-page-total').innerHTML = ts.toLocaleString('de-DE') + ' <span style="font-size:20px;color:var(--text2);font-weight:400;">€</span>';
  }

  const sortedKeys = Object.keys(data.finance).filter(k => (data.finance[k][type]||0) > 0).sort();
  const allDiv = document.getElementById(type+'-all-months');
  if (!sortedKeys.length) {
    allDiv.innerHTML = '<div style="color:var(--text2);text-align:center;padding:20px">No records yet</div>';
  } else {
    allDiv.innerHTML = sortedKeys.slice().reverse().map(k => {
      const m = data.finance[k];
      const [y, mo] = k.split('-');
      const d = new Date(parseInt(y), parseInt(mo)-1);
      const monthName = d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
      return `<div class="finance-hist-row"><div class="month">${monthName}</div><div style="font-size:16px;font-weight:700;color:var(--mint);">${(m[type]||0).toLocaleString('de-DE')} €</div></div>`;
    }).join('');
  }
}

['earned','saved'].forEach(type => {
  document.getElementById(type+'-prev').addEventListener('click', () => {
    if (type==='earned') earnedMonth = new Date(earnedMonth.getFullYear(), earnedMonth.getMonth()-1, 1);
    else savedMonth = new Date(savedMonth.getFullYear(), savedMonth.getMonth()-1, 1);
    renderFinancePage(type);
  });
  document.getElementById(type+'-next').addEventListener('click', () => {
    const now = new Date();
    const month = type==='earned' ? earnedMonth : savedMonth;
    const next = new Date(month.getFullYear(), month.getMonth()+1, 1);
    if (next <= new Date(now.getFullYear(), now.getMonth()+1, 0)) {
      if (type==='earned') earnedMonth = next; else savedMonth = next;
      renderFinancePage(type);
    }
  });
});

// ===== TOTAL MODAL (shared for earned & saved) =====
window.openTotalModal = function(type) {
  totalModalType = type;
  const data = load();
  if (!data.finance) data.finance = {};
  document.getElementById('total-modal-title').textContent = type==='earned' ? 'Total Earned' : 'Total Saved';

  const allKeys = Object.keys(data.finance).filter(k => (data.finance[k][type]||0) > 0).sort();
  const fromSel = document.getElementById('total-from');
  const toSel = document.getElementById('total-to');

  if (!allKeys.length) {
    fromSel.innerHTML = '<option>No data</option>';
    toSel.innerHTML = '<option>No data</option>';
    document.getElementById('total-range-amount').innerHTML = '0 <span class="currency">€</span>';
    document.getElementById('total-range-label').textContent = 'Total';
  } else {
    const options = allKeys.map(k => {
      const [y, mo] = k.split('-');
      const name = new Date(parseInt(y), parseInt(mo)-1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
      return `<option value="${k}">${name}</option>`;
    });
    fromSel.innerHTML = options.join('');
    toSel.innerHTML = options.join('');
    toSel.value = allKeys[allKeys.length-1];
    calcTotalRange();
  }

  fromSel.onchange = calcTotalRange;
  toSel.onchange = calcTotalRange;
  document.getElementById('total-modal-overlay').classList.add('open');
};

function calcTotalRange() {
  const data = load();
  if (!data.finance) return;
  const from = document.getElementById('total-from').value;
  const to = document.getElementById('total-to').value;
  if (!from || !to) return;

  let total = 0;
  Object.keys(data.finance).sort().forEach(k => {
    if (k >= from && k <= to) total += (data.finance[k][totalModalType] || 0);
  });

  const [fy, fm] = from.split('-');
  const [ty, tm] = to.split('-');
  const fromName = new Date(parseInt(fy),parseInt(fm)-1).toLocaleDateString('en-US',{month:'short',year:'numeric'});
  const toName = new Date(parseInt(ty),parseInt(tm)-1).toLocaleDateString('en-US',{month:'short',year:'numeric'});

  document.getElementById('total-range-label').textContent = from === to ? fromName : fromName + ' — ' + toName;
  document.getElementById('total-range-amount').innerHTML = total.toLocaleString('de-DE') + ' <span class="currency">€</span>';
}

window.closeTotalModal = function() {
  document.getElementById('total-modal-overlay').classList.remove('open');
};
document.getElementById('total-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeTotalModal();
});

// ===== INIT =====
initAuth().then(()=>{ if(!document.getElementById('login-screen').classList.contains('visible')) loadFromServer().then(()=>renderToday()); });

setInterval(async()=>{
  if(_saving) return;
  await loadFromServer();
  const ap=document.querySelector('.page.active');
  if(ap?.id==='page-today')renderToday(); else if(ap?.id==='page-habits')renderHabits();
  else if(ap?.id==='page-stats'){renderStats();if(selectedDay)showDayDetail(selectedDay.year,selectedDay.month,selectedDay.day);}
  else if(ap?.id==='page-finance')renderFinance(true);
},10000);

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
